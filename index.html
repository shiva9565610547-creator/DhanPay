<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swap Pay - Investment Platform</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #0b151e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); backdrop-filter: blur(10px); text-align: center; position: relative; }
        .brand-title { color: #00e5ff; font-size: 28px; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase; }
        .brand-sub { color: #8a99a8; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { color: #00e5ff; font-size: 13px; display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00e5ff; background: rgba(255, 255, 255, 0.08); }
        input::placeholder { color: #4e5d6c; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(90deg, #00d2ff 0%, #0072ff 100%); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); }
        .btn-submit:active { transform: scale(0.98); }
        .footer-text { color: #8a99a8; font-size: 13px; margin-top: 25px; }
        .footer-text span { color: #00e5ff; cursor: pointer; font-weight: 500; text-decoration: underline; }
        
        .hidden { display: none; }

        /* CUSTOM PROFESSIONAL POP-UP STYLE */
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; }
        .popup-box { background: #111a2e; border: 1px solid #1e293b; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .popup-icon { font-size: 45px; margin-bottom: 10px; display: block; }
        .popup-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .popup-text { font-size: 14px; color: #8a99a8; margin-bottom: 20px; }
        .popup-btn { background: #00e5ff; color: #0b151e; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <div class="brand-title">SWAP PAY</div>
        <div class="brand-sub">Your Investment Platform</div>

        <!-- 1. REGISTRATION FORM -->
        <div id="register-form">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="reg-phone" placeholder="+91 Enter Number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" placeholder="Enter Password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="Confirm Password">
            </div>
            <div class="form-group">
                <label>Invite Code (Optional)</label>
                <input type="text" id="reg-invite" placeholder="Enter Invite Code">
            </div>
            <button class="btn-submit" onclick="handleRegistration()">Create Account</button>
            <div class="footer-text">
                Already have an account? <span onclick="toggleForm('login')">Login</span>
            </div>
        </div>

        <!-- 2. LOGIN FORM -->
        <div id="login-form" class="hidden">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="login-phone" placeholder="+91 Enter Number">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="Enter Password">
            </div>
            <button class="btn-submit" onclick="handleLogin()">Sign In</button>
            <div class="footer-text">
                Don't have an account? <span onclick="toggleForm('register')">Register</span>
            </div>
        </div>
    </div>

    <!-- CUSTOM PROFESSIONAL POP-UP HTML -->
    <div id="custom-popup" class="popup-overlay">
        <div class="popup-box">
            <span id="p-icon" class="popup-icon">✔️</span>
            <div id="p-title" class="popup-title">Success!</div>
            <div id="p-text" class="popup-text">Account Created Successfully!</div>
            <button class="popup-btn" onclick="closePopup()">OK</button>
        </div>
    </div>

    <script>
        var nextStep = null;

        // कस्टम पॉप-अप ट्रिगर करने का फ़ंक्शन
        function showPopup(title, text, icon, type, callback) {
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-text').innerText = text;
            document.getElementById('p-icon').innerText = icon;
            
            var btn = document.querySelector('.popup-btn');
            if(type === 'error') {
                btn.style.background = '#ff4d4d';
                btn.style.color = '#fff';
            } else {
                btn.style.background = '#00e5ff';
                btn.style.color = '#0b151e';
            }
            
            document.getElementById('custom-popup').style.display = 'flex';
            nextStep = callback;
        }

        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
            if(nextStep) {
                nextStep();
                nextStep = null;
            }
        }

        // Form badalne ka function
        function toggleForm(formType) {
            if (formType === 'login') {
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
        }

        // Registration Logic
        function handleRegistration() {
            var phone = document.getElementById("reg-phone").value;
            var pass = document.getElementById("reg-pass").value;
            var confirm = document.getElementById("reg-confirm").value;

            if (phone === "" || pass === "" || confirm === "") {
                showPopup('Error!', 'Please Fill All Blanks!', '❌', 'error', null);
                return;
            }
            if (pass !== confirm) {
                showPopup('Error!', "Password doesn't match!", '❌', 'error', null);
                return;
            }

            localStorage.setItem("saved_phone", phone);
            localStorage.setItem("saved_pass", pass);
            
            showPopup('Success!', 'Account Created Successfully!', '✔️', 'success', function() {
                goToDashboard();
            });
        }

        // Login Logic
        function handleLogin() {
            var phone = document.getElementById("login-phone").value;
            var pass = document.getElementById("login-pass").value;

            var savedPhone = localStorage.getItem("saved_phone");
            var savedPass = localStorage.getItem("saved_pass");

            if (phone === "" || pass === "") {
                showPopup('Error!', 'Please Fill Phone And Password!', '❌', 'error', null);
                return;
            }

            if (phone === savedPhone && pass === savedPass) {
                showPopup('Welcome!', 'Login Successful!', '✔️', 'success', function() {
                    goToDashboard();
                });
            } else {
                showPopup('Error!', 'Check Password otherwise Phone No!', '❌', 'error', null);
            }
        }

        // Dashboard Redirector
        function goToDashboard() {
            window.location.href = "dashboard.html";
        }
    </script>

      // Firebase connect karne ke liye
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // User ka data/balance check karne ke liye function
      async function checkBalance(userId) {
        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) {
            alert("Aapka Balance: ₹" + userSnap.data().balance);
        } else {
            alert("User nahi mila!");
        }
      }
      window.checkBalance = checkBalance;
    </script>
</body>
</html>
