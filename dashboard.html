<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Agar pehle se koi balance store nahi hai toh 200 set karega
        if (!localStorage.getItem('wallet_balance')) {
            localStorage.setItem('wallet_balance', '200');
        }

        // Har baar sahi live balance screen par load karega
        let currentWallet = parseFloat(localStorage.getItem('wallet_balance') || '200');
        document.getElementById('dashboard-balance-num').innerText = "₹" + currentWallet.toFixed(2);
    });
