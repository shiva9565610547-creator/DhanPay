    <script>
        var nextStep = null;

        window.onload = function() {
            var savedPhone = localStorage.getItem("saved_phone");
            if(savedPhone) {
                document.getElementById("display-id").innerText = "Account: " + savedPhone;
            }
        };

        function showPopup(title, text, icon, type, callback) {
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-text').innerText = text;
            document.getElementById('p-icon').innerText = icon;
            document.getElementById('popup-dynamic-content').innerHTML = ''; // क्लियर करें
            
            var btn = document.querySelector('.popup-btn');
            if(type === 'error') {
                btn.style.background = '#ff4d4d';
                btn.style.color = '#fff';
            } else {
                btn.style.background = '#00ffcc';
                btn.style.color = '#0b111e';
            }
            
            document.getElementById('custom-popup').style.display = 'flex';
            nextStep = callback;
        }

        // टेलीग्राम के लिए एक स्पेशल पॉपअप जो कभी फेल नहीं होगा
        function openSupport() {
            window.open("https://t.me", "_blank");
        }


        function closePopup() {
            document.getElementById('custom-popup').style.display = 'none';
            if(nextStep) {
                nextStep();
                nextStep = null;
            }
        }

        function changePassword() {
            showPopup('Security', 'पासवर्ड बदलने का फ़ीचर अभी मेंटेनेंस में है।', '🔒', 'info', null);
        }

        function handleLogout() {
            localStorage.removeItem("user_logged");
            showPopup('Logged Out', 'Logout Success', '🚪', 'success', function() {
                window.location.href = "index.html";
            });
        }
        
    </script>
