<script>
    // Page load hone par balance dikhane ke liye
    function updateDisplay() {
        var phpBalance = "<?php echo $db_balance; ?>";
        var balanceTag = document.getElementById("withdraw-balance");
        
        if (phpBalance && phpBalance !== "<?" + "php echo $db_balance; ?>") {
            balanceTag.innerText = "₹" + parseFloat(phpBalance).toFixed(2);
        } else {
            var currentBalance = localStorage.getItem("user_balance") || "500.00";
            balanceTag.innerText = "₹" + parseFloat(currentBalance).toFixed(2);
        }
    }

    window.onload = updateDisplay;

    // Withdraw submit karne par paisa minus karne ka function
    function executeWithdraw(event) {
        event.preventDefault();
        
        var amountInput = document.getElementById("withdraw-amount").value;
        var amountToWithdraw = parseFloat(amountInput);
        var currentBalance = parseFloat(localStorage.getItem("user_balance") || "500.00");

        if (amountToWithdraw > currentBalance) {
            alert("Error: Aapke paas itna balance nahi hai!");
        } else {
            // Balance minus kar rahe hain
            var newBalance = currentBalance - amountToWithdraw;
            localStorage.setItem("user_balance", newBalance.toFixed(2));
            
            // Screen par naya balance update kar rahe hain
            updateDisplay();
            
            alert("Success: ₹" + amountToWithdraw + " ka withdrawal request lag gaya hai! Balance debit ho gaya.");
            document.getElementById("withdraw-amount").value = ""; // Input box khali karne ke liye
        }
    }
</script>
